version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./data/queuepro.db
      - JWT_SECRET=your-super-secret-key-change-this
      - PORT=3001
      - CLIENT_URL=*
      - NODE_ENV=production
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads
    restart: unless-stopped

volumes:
  app-data:
  app-uploads:
